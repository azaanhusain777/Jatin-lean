name: CI

on:
  push:
    branches: [ master, develop ]
    tags: [ 'v*' ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Run tests (release mode)
        run: cargo test --release --all-features

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: jatin-lean-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: jatin-lean-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jatin-lean-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jatin-lean-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jatin-lean-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/jatin-lean ${{ matrix.binary_name }}
          chmod +x ${{ matrix.binary_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/jatin-lean.exe ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

  npm-test:
    name: NPM Package Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: jatin-lean-linux-x64
          path: npm/bin/

      - name: Make binary executable
        run: chmod +x npm/bin/jatin-lean-linux-x64

      - name: Rename binary
        run: mv npm/bin/jatin-lean-linux-x64 npm/bin/jatin-lean

      - name: Test npm package
        working-directory: npm
        run: |
          node -e "const jl = require('./index.js'); console.log('Installed:', jl.isInstalled()); console.log('Version:', jl.getVersion());"

      - name: Test binary help
        run: npm/bin/jatin-lean --help

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test, build, npm-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/jatin-lean-linux-x64/jatin-lean-linux-x64
            artifacts/jatin-lean-linux-arm64/jatin-lean-linux-arm64
            artifacts/jatin-lean-macos-x64/jatin-lean-macos-x64
            artifacts/jatin-lean-macos-arm64/jatin-lean-macos-arm64
            artifacts/jatin-lean-windows-x64.exe/jatin-lean-windows-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
