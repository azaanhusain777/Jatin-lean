name: PR Check

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1: Code Quality — rustfmt + clippy
  # ──────────────────────────────────────────────────────
  code-quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────────────
  # Job 2: Unit + Integration Tests (Linux only for speed)
  # ──────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run unit tests
        run: cargo test --verbose

      - name: Run integration tests
        run: cargo test --test integration_test --verbose

      - name: Run tests in release mode
        run: cargo test --release

  # ──────────────────────────────────────────────────────
  # Job 3: Build Verification (compile check, not full release)
  # ──────────────────────────────────────────────────────
  build-check:
    name: 🔨 Build Check
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Check compilation (debug)
        run: cargo check --all-targets --all-features

      - name: Build binary (release)
        run: cargo build --release

      - name: Verify binary runs
        run: ./target/release/jatin-lean --help

  # ──────────────────────────────────────────────────────
  # Job 4: Documentation & File Checks
  # ──────────────────────────────────────────────────────
  docs-check:
    name: 📝 Docs & File Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required files
        run: |
          echo "Checking required project files..."
          files=("README.md" "LICENSE" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md" "Cargo.toml" "package.json")
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

      - name: Check for accidental large files
        run: |
          echo "Checking for accidentally committed large files (>5MB)..."
          large_files=$(find . -path ./.git -prune -o -path ./target -prune -o -type f -size +5M -print)
          if [ -n "$large_files" ]; then
            echo "❌ Large files detected (>5MB):"
            echo "$large_files"
            exit 1
          fi
          echo "✅ No large files found."

      - name: Check for debug/scratch files
        run: |
          echo "Checking for debug or scratch files that should not be committed..."
          bad_patterns=("errors.txt" "scratch" "scratch.rs" "*.pyc" ".DS_Store" "Thumbs.db")
          found_bad=false
          for pattern in "${bad_patterns[@]}"; do
            matches=$(find . -path ./.git -prune -o -path ./target -prune -o -name "$pattern" -print)
            if [ -n "$matches" ]; then
              echo "⚠️  Found unwanted file pattern '$pattern': $matches"
              found_bad=true
            fi
          done
          if [ "$found_bad" = true ]; then
            echo "❌ Please remove debug/scratch files before submitting your PR."
            exit 1
          fi
          echo "✅ No debug/scratch files found."

  # ──────────────────────────────────────────────────────
  # Job 5: PR Summary Comment (status badge)
  # ──────────────────────────────────────────────────────
  pr-summary:
    name: ✅ PR Summary
    runs-on: ubuntu-latest
    needs: [code-quality, test, build-check, docs-check]
    if: always()
    steps:
      - name: Determine overall status
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Code Quality (fmt + clippy) | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit & Integration Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build Check | ${{ needs.build-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Docs & File Check | ${{ needs.docs-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.code-quality.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.build-check.result }}" != "success" || "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "❌ **Some checks failed.** Please fix the issues above before this PR can be merged." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "🎉 **All checks passed!** This PR is ready for review." >> $GITHUB_STEP_SUMMARY
